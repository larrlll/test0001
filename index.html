<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORTISOLO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:            #FFFFFF;
    --surface:       #FFFFFF;
    --brown:         #007AFF;
    --brown-mid:     #0A84FF;
    --brown-light:   #5AB0FF;
    --ivory:         #EAF3FF;
    --ivory-deep:    #CFE4FF;
    --border:        #E2E8F0;
    --text:          #1C1C1E;
    --muted:         #8E8E93;
    --danger:        #FF3B30;
    --secret-bg:     #FFFFFF;
    --secret-border: #5AB0FF;
    --warm-shadow:   rgba(0,122,255,.10);
  }
  html { height: 100%; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: #FFFFFF;
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 200;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 19px;
    color: var(--text);
    user-select: none;
  }
  .logo em { font-style: normal; color: var(--brown); }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .header-count {
    display: flex; align-items: center; gap: 4px;
    background: var(--ivory);
    border: 1px solid var(--ivory-deep);
    border-radius: 20px;
    padding: 4px 12px;
  }
  .hc-label { font-size: 11px; color: var(--brown-mid); }
  .hc-num   { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 700; color: var(--brown); }
  .hc-unit  { font-size: 11px; color: var(--brown-mid); }
  .dev-btn {
    font-size: 11px; color: var(--muted);
    cursor: pointer; letter-spacing: .4px;
    transition: color .2s; white-space: nowrap;
    background: none; border: none; padding: 0;
    font-family: inherit;
  }
  .dev-btn:hover { color: var(--brown); }

  /* DEV DROPDOWN */
  .dev-dropdown {
    position: absolute; top: 56px; right: 28px;
    width: 300px; background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: 0 0 14px 14px;
    padding: 14px 16px 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,.08);
    display: none; z-index: 300;
  }
  .dev-dropdown.open { display: block; }
  .dd-inner { display: flex; gap: 8px; align-items: center; }
  .dd-inner input {
    flex: 1; background: var(--ivory);
    border: 1px solid var(--ivory-deep);
    border-radius: 8px; padding: 8px 12px;
    color: var(--text); font-size: 13px; outline: none;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .dd-inner input::placeholder { color: var(--muted); }
  .dd-ok {
    background: var(--brown-light); color: #fff;
    border: none; border-radius: 8px; padding: 8px 16px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background .2s; white-space: nowrap;
  }
  .dd-ok:hover { background: var(--brown-mid); }
  .dd-msg { font-size: 11.5px; color: #ffaaaa; margin-top: 7px; }

  /* CENTER STAGE */
  .center-stage {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .write-wrap { width: 100%; max-width: 600px; }
  .write-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 24px 24px 18px;
    box-shadow: 0 4px 28px var(--warm-shadow);
    transition: border-color .25s, background .25s;
  }
  .write-card.secret-mode {
    background: var(--secret-bg);
    border-color: var(--secret-border);
  }
  textarea {
    width: 100%; min-height: 130px; resize: vertical;
    border: 1.5px solid var(--border); border-radius: 13px;
    padding: 14px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; line-height: 1.8;
    color: var(--text); background: transparent;
    outline: none; display: block;
    transition: border-color .2s, box-shadow .2s;
  }
  textarea:focus {
    border-color: var(--brown-mid);
    box-shadow: 0 0 0 3px rgba(139,94,74,.1);
  }
  textarea::placeholder { color: var(--ivory-deep); }
  .write-footer {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-top: 12px; gap: 10px; flex-wrap: wrap;
  }
  .byte-ct { font-family: 'Space Grotesk', sans-serif; font-size: 11.5px; color: var(--muted); }
  .byte-ct.warn { color: var(--danger); font-weight: 600; }
  .actions { display: flex; gap: 10px; align-items: center; }

  /* CHECKBOX */
  .secret-label {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; font-size: 13px; color: var(--muted);
    user-select: none; transition: color .2s;
  }
  .secret-label:hover { color: var(--brown-mid); }
  .secret-label input[type="checkbox"] { display: none; }
  .s-box {
    width: 17px; height: 17px;
    border: 1.5px solid var(--border); border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; flex-shrink: 0; background: #fff;
  }
  .secret-label input:checked + .s-box { background: var(--brown-mid); border-color: var(--brown-mid); }
  .secret-label input:checked + .s-box::after { content: '✓'; font-size: 10px; color: #fff; font-weight: 700; }
  .secret-label input:checked ~ .s-text { color: var(--brown-mid); font-weight: 500; }

  .btn-reg {
    background: var(--brown); color: var(--ivory);
    border: none; border-radius: 11px; padding: 9px 24px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background .2s, transform .1s;
  }
  .btn-reg:hover { background: var(--brown-mid); }
  .btn-reg:active { transform: scale(.97); }
  .btn-reg:disabled { background: var(--ivory-deep); color: var(--muted); cursor: not-allowed; }

  /* POSTS */
  .posts-section { flex-shrink: 0; padding-bottom: 60px; }
  .divider {
    max-width: 600px; margin: 0 auto 22px; padding: 0 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .d-line { flex: 1; height: 1px; background: var(--border); }
  .d-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--ivory-deep); }
  .posts-wrap { max-width: 600px; margin: 0 auto; padding: 0 20px; }
  .posts-hdr {
    font-size: 10.5px; font-weight: 500; color: var(--muted);
    letter-spacing: 1.8px; text-transform: uppercase; margin-bottom: 14px;
  }
  .post-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 16px; padding: 18px 20px; margin-bottom: 10px;
    transition: box-shadow .2s, transform .2s;
    position: relative; overflow: hidden;
  }
  .post-card:hover { box-shadow: 0 6px 22px var(--warm-shadow); transform: translateY(-1px); }
  .post-card.is-secret { background: var(--secret-bg); border-color: var(--secret-border); }
  .post-card.is-secret::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--brown-light); border-radius: 3px 0 0 3px;
  }
  .post-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .post-anon { font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; color: var(--brown-mid); }
  .post-time { font-size: 11px; color: var(--ivory-deep); }
  .badge-secret {
    font-size: 10px; font-weight: 600;
    background: var(--ivory); color: var(--brown-mid);
    border-radius: 6px; padding: 2px 7px; margin-left: auto;
    border: 1px solid var(--secret-border);
  }
  .post-body { font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-all; }
  .post-card.is-secret:not(.revealed) .post-body {
    color: var(--secret-bg); user-select: none; pointer-events: none;
  }
  .post-lock {
    position: absolute; left: 0; right: 0; bottom: 0;
    top: 42px;
    border-radius: 0 0 16px 16px;
    background: var(--secret-bg);
  }
  .post-card.is-secret.revealed .post-lock { display: none; }
  .btn-del {
    position: absolute; top: 12px; right: 14px;
    background: none; border: none; font-size: 14px;
    color: var(--ivory-deep); cursor: pointer;
    transition: color .2s; display: none;
  }
  .dev-mode .btn-del { display: block; }
  .btn-del:hover { color: var(--danger); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 26px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--brown); color: var(--ivory);
    font-size: 13px; padding: 11px 22px; border-radius: 50px;
    opacity: 0; pointer-events: none; transition: all .28s;
    white-space: nowrap; z-index: 999;
    box-shadow: 0 4px 16px rgba(92,61,46,.22);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; padding: 44px 20px; color: var(--muted); font-size: 13px; line-height: 2.2; font-weight: 300; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }

  @media (max-width: 480px) {
    header { padding: 0 16px; }
    .dev-dropdown { right: 16px; width: calc(100vw - 32px); }
    .write-card { padding: 18px 16px 14px; }
    .hc-label { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">CORTI<em>SOLO</em></div>
  <div class="header-right">
    <div class="header-count">
      <span class="hc-label">작성자&nbsp;</span>
      <span class="hc-num" id="headerCount">0</span>
      <span class="hc-unit">&nbsp;명</span>
    </div>
    <button class="dev-btn" id="devToggle">🔐 개발자</button>
  </div>
  <div class="dev-dropdown" id="devDropdown">
    <div class="dd-inner">
      <input type="password" id="devPwInput" placeholder="개발자 비밀번호">
      <button class="dd-ok" id="ddOk">확인</button>
    </div>
    <div class="dd-msg" id="authMsg"></div>
  </div>
</header>

<div class="center-stage">
  <div class="write-wrap">
    <div class="write-card" id="writeCard">
      <textarea id="msgInput" placeholder="당신의 마음을 전달해 보세요. (최대 1,000바이트)"></textarea>
      <div class="write-footer">
        <span class="byte-ct" id="byteCt">0 / 1,000 byte</span>
        <div class="actions">
          <label class="secret-label">
            <input type="checkbox" id="secretCheck">
            <span class="s-box"></span>
            <span class="s-text">🔒 비밀글</span>
          </label>
          <button class="btn-reg" id="submitBtn" disabled>등록</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="posts-section" id="postsSection" style="display:none">
  <div class="divider">
    <div class="d-line"></div><div class="d-dot"></div><div class="d-line"></div>
  </div>
  <div class="posts-wrap">
    <div class="posts-hdr">최근 메시지</div>
    <div id="postList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  var DEV_PW = 'dev2024!';
  var isDevMode = false;
  var posts = [];

  /* ── 바이트 계산 ── */
  function byteLen(str) {
    var b = 0;
    for (var i = 0; i < str.length; i++)
      b += (str.charCodeAt(i) > 127) ? 3 : 1;
    return b;
  }

  /* ── textarea 입력 ── */
  var msgInput  = document.getElementById('msgInput');
  var byteCt    = document.getElementById('byteCt');
  var submitBtn = document.getElementById('submitBtn');
  var writeCard = document.getElementById('writeCard');
  var secretChk = document.getElementById('secretCheck');

  msgInput.addEventListener('input', function () {
    var val   = msgInput.value;
    var bytes = byteLen(val);
    if (bytes > 1000) {
      var cut = '', total = 0;
      for (var i = 0; i < val.length; i++) {
        var b = (val.charCodeAt(i) > 127) ? 3 : 1;
        if (total + b > 1000) break;
        cut += val[i]; total += b;
      }
      msgInput.value = cut;
      bytes = total;
    }
    byteCt.textContent = bytes.toLocaleString() + ' / 1,000 byte';
    byteCt.className   = 'byte-ct' + (bytes >= 900 ? ' warn' : '');
    submitBtn.disabled = (bytes === 0);
  });

  secretChk.addEventListener('change', function () {
    writeCard.classList.toggle('secret-mode', secretChk.checked);
  });

  /* ── 등록 ── */
  var WORDS = ['봄비','여름','가을','겨울','달빛','별빛','노을','새벽','구름','바람',
               '파도','숲속','꽃잎','눈꽃','안개','햇살','이슬','서리','돌멩','강물',
               '고요','사색','여백','온기','그리움','설렘','다짐','소망','기억','오늘'];

  submitBtn.addEventListener('click', function () {
    var text = msgInput.value.trim();
    if (!text) return;
    var isSecret  = secretChk.checked;
    var displayId = isSecret
      ? '@익명'
      : '@' + WORDS[Math.floor(Math.random() * WORDS.length)];

    posts.unshift({
      id: Date.now(), text: text,
      isSecret: isSecret, displayId: displayId,
      time: new Date().toISOString()
    });

    msgInput.value      = '';
    secretChk.checked   = false;
    writeCard.classList.remove('secret-mode');
    byteCt.textContent  = '0 / 1,000 byte';
    byteCt.className    = 'byte-ct';
    submitBtn.disabled  = true;

    renderPosts();
    updateCount();
    showToast('✓ 등록되었습니다');
  });

  /* ── 삭제 ── */
  window.deletePost = function (id) {
    if (!isDevMode) return;
    posts = posts.filter(function (p) { return p.id !== id; });
    renderPosts();
    updateCount();
    showToast('삭제했습니다');
  };

  /* ── 렌더 ── */
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtTime(iso) {
    var d = new Date(iso);
    var p = function(n){ return String(n).padStart(2,'0'); };
    return d.getFullYear()+'.'+p(d.getMonth()+1)+'.'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
  }

  function renderPosts() {
    var section = document.getElementById('postsSection');
    var list    = document.getElementById('postList');
    if (posts.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';

    list.innerHTML = posts.map(function (p) {
      var rev  = isDevMode || !p.isSecret;
      var lock = rev ? '' : '<div class="post-lock"></div>';
      var del  = isDevMode
        ? '<button class="btn-del" onclick="deletePost('+p.id+')">✕</button>'
        : '';
      return '<div class="post-card'+(p.isSecret?' is-secret':'')+' '+(rev?'revealed':'')+'">'+
        del+
        '<div class="post-meta">'+
          '<span class="post-anon">'+esc(p.displayId)+'</span>'+
          '<span class="post-time">'+fmtTime(p.time)+'</span>'+
          (p.isSecret ? '<span class="badge-secret">비밀글</span>' : '')+
        '</div>'+
        '<div class="post-body">'+esc(p.text)+'</div>'+
        lock+
      '</div>';
    }).join('');
  }

  function updateCount() {
    document.getElementById('headerCount').textContent = posts.length;
  }

  /* ── 개발자 드롭다운 ── */
  var devToggle  = document.getElementById('devToggle');
  var devDrop    = document.getElementById('devDropdown');
  var devPwInput = document.getElementById('devPwInput');
  var authMsg    = document.getElementById('authMsg');
  var ddOk       = document.getElementById('ddOk');

  devToggle.addEventListener('click', function (e) {
    e.stopPropagation();
    devDrop.classList.toggle('open');
  });
  document.addEventListener('click', function (e) {
    if (!devDrop.contains(e.target)) devDrop.classList.remove('open');
  });

  ddOk.addEventListener('click', tryLogin);
  devPwInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') tryLogin();
  });

  function tryLogin() {
    if (devPwInput.value === DEV_PW) {
      isDevMode = true;
      document.body.classList.add('dev-mode');
      devDrop.classList.remove('open');
      devToggle.textContent = '✅ 개발자 ON';
      devPwInput.value = '';
      authMsg.textContent = '';
      renderPosts();
      showToast('개발자 모드로 접속했습니다');
    } else {
      authMsg.textContent = '비밀번호가 올바르지 않습니다.';
    }
  }

  /* ── 토스트 ── */
  var toastEl = document.getElementById('toast');
  var toastTimer;
  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 2200);
  }

  renderPosts();
  updateCount();
})();
</script>
</body>
</html>
